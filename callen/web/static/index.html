<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Callen — Support Console</title>
    <link rel="stylesheet" href="/static/style.css?v=10">
</head>
<body>

<header class="topbar">
    <div class="brand">
        <span class="brand-mark">●</span>
        Callen
    </div>
    <div class="topbar-right">
        <div class="counts">
            <span class="count-pill" id="count-open">— open</span>
            <span class="count-pill pending" id="count-pending">— pending</span>
            <span class="count-pill flagged" id="count-flagged">— flagged</span>
            <span class="count-pill calls" id="count-active">— active calls</span>
        </div>
        <div class="operator-widget">
            <span class="label">Operator:</span>
            <button class="status-btn" data-status="available">Available</button>
            <button class="status-btn" data-status="busy">Busy</button>
            <button class="status-btn" data-status="dnd">DND</button>
        </div>
    </div>
</header>

<main class="workspace">

    <!-- Left: queue -->
    <aside class="panel panel-queue">
        <!-- Always-visible live strip: active calls that's sticky at top -->
        <div class="live-strip hidden" id="live-strip">
            <div class="live-strip-header">
                <span class="live-dot"></span>
                <span>LIVE</span>
                <span class="live-strip-count" id="live-strip-count"></span>
            </div>
            <div class="live-strip-list" id="live-strip-list"></div>
        </div>

        <div class="queue-tabs">
            <button class="tab active" data-tab="incidents">Incidents</button>
            <button class="tab" data-tab="todos">Todos</button>
            <button class="tab" data-tab="pending-emails">Email triage</button>
            <button class="tab" data-tab="flagged-emails">Flagged</button>
            <button class="tab" data-tab="contacts">Contacts</button>
        </div>
        <div class="queue-filters" id="queue-filters"></div>
        <div class="queue-list" id="queue-list">
            <div class="empty-state">Loading…</div>
        </div>
    </aside>

    <!-- Center: selected item detail -->
    <section class="panel panel-detail">
        <div class="detail-header" id="detail-header">
            <div class="detail-title">Select something from the queue</div>
        </div>
        <div class="detail-actions" id="detail-actions"></div>
        <div class="detail-body" id="detail-body">
            <div class="empty-state">Your workspace will show a ticket, email, or call here.</div>
        </div>
    </section>

    <!-- Right: context panel (contact / metadata / related) -->
    <aside class="panel panel-context">
        <div class="context-section" id="context-section">
            <div class="empty-state">Context appears when an item is selected.</div>
        </div>
    </aside>

</main>

<!-- Bottom: agent prompt bar -->
<footer class="promptbar">
    <span class="prompt-icon">▸</span>
    <form id="prompt-form" autocomplete="off">
        <input
            type="text"
            id="prompt-input"
            placeholder="Ask Callen to do anything… (Ctrl+K to focus)"
            autocomplete="off"
            spellcheck="false">
    </form>
    <span class="prompt-hint">Enter to send • Esc to close output</span>
</footer>

<!-- Floating agent output drawer -->
<div class="agent-drawer hidden" id="agent-drawer">
    <div class="agent-drawer-header">
        <span class="agent-status" id="agent-status">Running…</span>
        <span class="agent-turn" id="agent-turn" title="Conversation turn">Turn 1</span>
        <span class="agent-run-id" id="agent-run-id"></span>
        <button class="agent-btn" id="agent-new" title="Start a fresh claude conversation">New chat</button>
        <button class="agent-btn" id="agent-minimize" title="Minimize (Esc)">−</button>
    </div>
    <div class="agent-drawer-body" id="agent-drawer-body"></div>
</div>

<script src="/static/app.js?v=10"></script>
</body>
</html>
